version: '3.8'

services:
  model-server:
    build: .
    container_name: zhiban-ai-model
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./data:/app/data
    environment:
      - MODEL_PATH=output/training/final_model
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:18-alpine
    container_name: zhiban-ai-frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - model-server
    environment:
      - VITE_MODEL_SERVER=http://model-server:8000

volumes:
  model-data:
